<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Zara’s Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* [Note] Styling the background and centering the login box */
        body { 
            background: #FDFBF6; /* Cream Background */
            font-family: 'Quicksand', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* [Note] The container for the login form */
        .login-box { 
            background: white; 
            border: 4px dashed #C4B0FF; /* Soft Violet Border */
            border-radius: 30px; 
            padding: 40px; 
            text-align: center; 
            width: 320px; 
            box-shadow: 0 8px 20px rgba(163, 177, 138, 0.2); 
        }

        h2 { font-family: 'Fredoka', sans-serif; color: #3a2b5c; }
        
        /* [Note] Styling the input field and button */
        input { 
            width: 80%; padding: 12px; border-radius: 15px; 
            border: 2px solid #A3B18A; /* Sage Green Border */
            margin-bottom: 15px; outline: none; 
        }

        button { 
            background: #A3B18A; color: white; border: none; 
            padding: 12px 30px; border-radius: 15px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }

        button:hover { background: #C4B0FF; } /* Changes to Violet on hover */
    </style>
</head>
<body>

    <div class="login-box">
        <h2>You Found Me!</h2>
        <p>Zara’s Life ♪(´▽｀)</p>
        <input type="password" id="passwordInput" placeholder="Enter Password">
        <br>
        <button onclick="login()">Enter</button>
    </div>

    <script>
        // [Note] This function checks the password
        function login() {
            const pass = document.getElementById('passwordInput').value;
            if(pass === "zara") { // You can change "zara" to any password you want
                sessionStorage.setItem('isLoggedIn', 'true'); // Saves the 'key' in the browser
                window.location.href = "index.html"; // Redirects to your main page
            } else {
                alert("Incorrect password!");
            }
        }
    </script>
</body>
</html>
