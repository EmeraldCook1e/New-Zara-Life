<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zara's Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sage: #A3B18A; --violet: #C4B0FF; --cream: #FDFBF6; }
        body { background-color: var(--cream); font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; padding: 50px 20px; margin: 0; }
        .main-display { background: white; border: 8px solid var(--sage); border-radius: 50px; width: 900px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        .main-header { background: var(--sage); border-radius: 30px; padding: 25px; color: white; margin-bottom: 30px; position: relative; }
        .deco-circle { position: absolute; right: 25px; top: 15px; width: 70px; height: 70px; background: white; border-radius: 50%; background-image: radial-gradient(var(--violet) 2px, transparent 2px); background-size: 10px 10px; }
        .grid { display: grid; grid-template-columns: 150px 1fr 1fr; gap: 20px; }
        .tiny-img { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; border: 4px solid var(--violet); margin-bottom: 10px; }
        .side-btn { display: block; background: var(--sage); color: white; padding: 10px; margin-top: 8px; border-radius: 12px; text-decoration: none; text-align: center; font-size: 14px; font-weight: bold; }
        .bubble { background: var(--cream); border: 3px solid var(--violet); border-radius: 20px; padding: 15px; }
        .label-row { display: flex; align-items: center; gap: 8px; font-family: 'Fredoka'; color: var(--sage); margin-bottom: 10px; font-size: 18px; }
        .icon-circle { background: var(--violet); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .photo-frame { width: 100%; border-radius: 20px; border: 4px solid var(--sage); margin-top: 10px; }
        .footer { text-align: center; color: var(--sage); padding-top: 20px; font-family: 'Fredoka'; }
    </style>
</head>
<body>
<div class="main-display">
    <div class="main-header">
        <div class="deco-circle"></div>
        <h1 style="margin:0; font-family:'Fredoka'">ε home + about з</h1>
        <p>Welcome to my page!</p>
    </div>
    <div class="grid">
        <div>
            <img src="IMG_2765.jpeg" class="tiny-img">
            <img src="IMG_2766.jpeg" class="tiny-img">
            <a href="#" class="side-btn">Music</a>
            <a href="#" class="side-btn">Crochet</a>
        </div>
        <div>
            <div class="label-row"><div class="icon-circle"><i class="fa-solid fa-star"></i></div> Welcome!</div>
            <div class="bubble">I made this for fun because I was bored!</div>
            <img src="IMG_2764.jpeg" class="photo-frame">
        </div>
        <div>
            <img src="IMG_2767.jpeg" class="photo-frame" style="margin-top:0; margin-bottom:15px;">
            <div class="label-row"><div class="icon-circle"><i class="fa-solid fa-heart"></i></div> My Faves</div>
            <div class="bubble">
                <ul style="padding-left:15px; margin:0;">
                    <li>F1 & Books</li>
                    <li>Plushies</li>
                    <li>Food</li>
                </ul>
            </div>
        </div>
    </div>
    <div class="footer">hehe</div>
</div>
<script>
    if (localStorage.getItem('zara_access_2026') !== 'true') { window.location.href = "login.html"; }
</script>
</body>
</html>
